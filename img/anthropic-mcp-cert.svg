<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Mint/Sage Background -->
  <rect width="800" height="600" fill="#B5C9C2"/>

  <!-- Inner Margin Border Frame -->
  <rect x="25" y="25" width="750" height="550" fill="none" stroke="#A2B7B0" stroke-width="1.5"/>

  <!-- Top Pill Badge: CERTIFICATE OF COMPLETION -->
  <g transform="translate(400, 115)">
    <rect x="-170" y="-22" width="340" height="44" rx="22" fill="none" stroke="#111827" stroke-width="2.5"/>
    <!-- Checkmark Circle -->
    <circle cx="-135" cy="0" r="13" fill="none" stroke="#111827" stroke-width="2"/>
    <path d="M-140 0 L-137 3 L-130 -4" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Badge Text -->
    <text x="15" y="5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="700" fill="#111827" letter-spacing="3" text-anchor="middle">CERTIFICATE OF COMPLETION</text>
  </g>

  <!-- Name -->
  <text x="400" y="225" font-family="'Georgia', 'Times New Roman', serif" font-size="34" font-weight="400" fill="#111827" text-anchor="middle">Manya G Karle</text>

  <!-- Subtitle -->
  <text x="400" y="262" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" fill="#2B3733" text-anchor="middle">has completed</text>

  <!-- Course Title (2 lines) -->
  <text x="400" y="325" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="800" fill="#111827" text-anchor="middle" letter-spacing="-0.5">Introduction to Model</text>
  <text x="400" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="800" fill="#111827" text-anchor="middle" letter-spacing="-0.5">Context Protocol</text>

  <!-- Anthropic Logo at Bottom -->
  <g transform="translate(400, 495)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="19" font-weight="900" fill="#111827" letter-spacing="4" text-anchor="middle">ANTHROP\C</text>
  </g>
</svg>
