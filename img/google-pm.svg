<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F4F7FB" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285F4" />
      <stop offset="25%" stop-color="#EA4335" />
      <stop offset="50%" stop-color="#FBBC05" />
      <stop offset="75%" stop-color="#34A853" />
      <stop offset="100%" stop-color="#4285F4" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="600" height="380" rx="16" fill="url(#bg-grad)"/>
  
  <!-- Outer Border & Accent Top Bar -->
  <rect width="600" height="380" rx="16" fill="none" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="0" y="0" width="600" height="8" rx="4" fill="url(#accent-grad)"/>

  <!-- Watermark Pattern Background -->
  <circle cx="500" cy="90" r="140" fill="#4285F4" opacity="0.03"/>
  <circle cx="100" cy="300" r="120" fill="#34A853" opacity="0.03"/>

  <!-- Content Container -->
  <!-- Google Header Icon & Text -->
  <g transform="translate(50, 45)">
    <!-- Google Four-color SVG G Logo -->
    <path d="M24 10.2c0-.7-.1-1.4-.2-2H12v4.2h6.8c-.3 1.5-1.1 2.8-2.4 3.7v3h3.9c2.3-2.1 3.7-5.2 3.7-8.9z" fill="#4285F4"/>
    <path d="M12 22.4c3.3 0 6.1-1.1 8.1-3l-3.9-3c-1.1.7-2.5 1.2-4.2 1.2-3.2 0-6-2.2-7-5.1H1.1v3.1c2.1 4.1 6.3 6.8 10.9 6.8z" fill="#34A853"/>
    <path d="M5 12.5c-.2-.7-.4-1.6-.4-2.5s.2-1.8.4-2.5V4.4H1.1C.4 5.8 0 7.4 0 9.2s.4 3.4 1.1 4.8l3.9-1.5z" fill="#FBBC05"/>
    <path d="M12 4c1.8 0 3.4.6 4.7 1.8l3.5-3.5C18.1 1 15.3 0 12 0 7.4 0 3.2 2.7 1.1 6.8l3.9 3.1c1-2.9 3.8-5.9 7-5.9z" fill="#EA4335"/>
    <text x="36" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#1F2937">Google</text>
  </g>

  <!-- Badge Header Line -->
  <text x="50" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" fill="#4285F4" letter-spacing="1.5">PROFESSIONAL CERTIFICATE</text>

  <!-- Certificate Title -->
  <text x="50" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="800" fill="#111827">Google Project Management</text>

  <!-- Subtitle / Description -->
  <text x="50" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#4B5563">Agile Project Management · Scrum · Leadership · Process Improvement</text>

  <!-- Divider -->
  <line x1="50" y1="220" x2="550" y2="220" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Footer Info -->
  <g transform="translate(50, 255)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#6B7280">CREDENTIAL ID</text>
    <text x="0" y="22" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="700" fill="#111827">BIDDYCN3VXEB</text>
  </g>

  <!-- Verified Badge Icon -->
  <g transform="translate(480, 240)">
    <circle cx="30" cy="30" r="28" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
    <path d="M22 30l6 6 12-12" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <text x="510" y="312" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#2563EB" text-anchor="middle">VERIFIED</text>

</svg>
