<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="100%" height="100%">
  <defs>
    <linearGradient id="anthropic-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#191918" />
      <stop offset="100%" stop-color="#0D0D0C" />
    </linearGradient>
    <linearGradient id="anthropic-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97757" />
      <stop offset="100%" stop-color="#E89B7E" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="600" height="380" rx="16" fill="url(#anthropic-bg)"/>
  
  <!-- Subtle Border -->
  <rect width="600" height="380" rx="16" fill="none" stroke="#2D2D2B" stroke-width="2"/>
  
  <!-- Terracotta Top Bar -->
  <rect x="0" y="0" width="600" height="8" rx="4" fill="url(#anthropic-accent)"/>

  <!-- Decorative Abstract Geometric Graphic (Anthropic style) -->
  <path d="M 450 60 L 530 60 L 490 140 Z" fill="#D97757" opacity="0.12"/>
  <path d="M 480 120 L 560 120 L 520 200 Z" fill="#F0EFEA" opacity="0.06"/>

  <!-- Anthropic Monogram/Logo & Header -->
  <g transform="translate(50, 48)">
    <!-- Anthropic 'A' icon -->
    <path d="M 12 0 L 24 24 L 18 24 L 14.5 17 L 9.5 17 L 6 24 L 0 24 Z M 12 11.5 L 10.7 14.2 L 13.3 14.2 Z" fill="#D97757"/>
    <text x="36" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="700" fill="#F0EFEA" letter-spacing="0.5">Anthropic</text>
  </g>

  <!-- Badge Eyebrow -->
  <text x="50" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" fill="#D97757" letter-spacing="1.5">OFFICIAL CERTIFICATION</text>

  <!-- Course Title -->
  <text x="50" y="156" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">Introduction to Model Context</text>
  <text x="50" y="188" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">Protocol (MCP)</text>

  <!-- Divider -->
  <line x1="50" y1="225" x2="550" y2="225" stroke="#333330" stroke-width="1"/>

  <!-- Footer Skills & Date -->
  <g transform="translate(50, 260)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#999990">ISSUED DATE</text>
    <text x="0" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#F0EFEA">Jul 2026</text>
  </g>

  <g transform="translate(220, 260)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#999990">KEY SKILLS</text>
    <text x="0" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#D97757">MCP · AI Tooling · LLM Architecture</text>
  </g>

  <!-- Verified Pill Badge -->
  <g transform="translate(450, 255)">
    <rect x="0" y="0" width="100" height="34" rx="17" fill="#262624" stroke="#40403C" stroke-width="1"/>
    <circle cx="20" cy="17" r="5" fill="#D97757"/>
    <text x="34" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#F0EFEA" letter-spacing="0.5">VERIFIED</text>
  </g>

</svg>
